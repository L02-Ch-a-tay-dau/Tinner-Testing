# SonarCloud configuration for Tinner Mobile

# Project identity (update key/org if your remote repository uses different values)
sonar.projectKey=Flappy-Devs_Tinner
sonar.organization=flappy-devs
sonar.projectName=Tinner Mobile
sonar.projectVersion=1.0.0

# Source and test folders
sonar.sources=app,src
sonar.tests=__tests__
sonar.test.inclusions=**/__tests__/**/*.test.tsx,**/__tests__/**/*.test.ts

# Exclusions for analysis
sonar.exclusions=**/node_modules/**,**/__mocks__/**,**/coverage/**,**/*.d.ts,**/assets/**,**/android/**,**/ios/**

# Coverage report generated by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Keep coverage focused on current rubric-tested screens
sonar.coverage.exclusions=src/**,app/_layout.tsx,app/index.tsx,app/LoginScreen.tsx,app/SplashScreen.tsx,app/VerifyOtpScreen.tsx

# Encoding and TS config
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json
