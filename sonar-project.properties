# SonarCloud configuration for Tinner Testing

# Project identity for the current GitHub repo
sonar.projectKey=nhantruongthanh123_Tinner-Testing
sonar.organization=nhantruongthanh123
sonar.projectName=Tinner-Testing
sonar.projectVersion=1.0.0

# Source and test folders
sonar.sources=app
sonar.tests=__tests__
sonar.test.inclusions=**/__tests__/**/*.test.tsx,**/__tests__/**/*.test.ts

# Exclusions for analysis
sonar.exclusions=**/node_modules/**,**/__mocks__/**,**/coverage/**,**/*.d.ts,**/assets/**,**/android/**,**/ios/**

# Coverage report generated by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Keep coverage focused on current rubric-tested screens
sonar.coverage.exclusions=app/_layout.tsx,app/index.tsx,app/HomeScreen.tsx,app/OnboardingScreen.tsx


# Encoding and TS config
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json
