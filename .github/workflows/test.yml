# .github/workflows/test.yml
# Pipeline CI: Chạy Jest → sinh coverage → đẩy lên SonarCloud
#
# Trigger: mỗi lần push lên main/develop hoặc mở Pull Request vào main

name: Test & SonarCloud Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-analyze:
    name: Jest Tests + SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Jest with coverage
        run: npm run test:coverage
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          EXPO_PUBLIC_SUPABASE_KEY: placeholder_key

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: coverage/lcov-report
          retention-days: 7

      - name: Install SonarQube Scanner
        run: npm install -g sonarqube-scanner

      - name: SonarCloud Scan
        run: sonar-scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io